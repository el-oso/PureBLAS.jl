name: CI
on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Parallel jobs run DISJOINT slices of the suite (PUREBLAS_TEST_GROUP/SHARD, read by test/runtests.jl):
  # `test` shards the correctness suite across 2 runners (with coverage → Coveralls parallel build);
  # `checks` runs only the inference-heavy dogfood (StrictMode strict contracts, TrimCheck trim-safety,
  # Aqua) tagged `:checks`. Every testitem still runs — the split is scheduling only (wall-clock ≈ the
  # slowest slice). Local `Pkg.test()` (no env) runs the FULL suite unchanged.
  test:
    name: Julia ${{ matrix.version }} - main (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    # The suite uses TrimCheck (Julia 1.12 `Compiler` stdlib), JET, StrictMode, ForwardDiff — pinned to
    # 1.12 (nightly dropped: compiler-internals churn broke it and it added no signal).
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          PUREBLAS_TEST_GROUP: main
          PUREBLAS_SHARD: ${{ matrix.shard }}
          PUREBLAS_NSHARDS: '2'
      - uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage to Coveralls (parallel)
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          flag-name: main-${{ matrix.shard }}
          parallel: true
          fail-on-error: false

  coverage-finish:
    name: Coveralls finish
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Close the Coveralls parallel build
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          carryforward: "main-1,main-2"
          fail-on-error: false

  checks:
    name: Julia 1.12 - trim/strict/aqua checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      # Inference/trim-safety dogfood — no line coverage (these exercise the SAME kernels the `test` job
      # already covers functionally; they assert type-stability/no-alloc/trim-safety, not new surface).
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: false
        env:
          PUREBLAS_TEST_GROUP: checks

  perf:
    name: Perf regression (PkgBenchmark judge)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # judge checks out the PR base ref → needs full history
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      # Blocks the merge on a >25% slowdown vs the base branch (coarse: shared runners are noisy — see
      # benchmark/judge_ci.jl). Precise 0.96× OpenBLAS gating runs on a pinned self-hosted fleet runner.
      - name: Judge performance vs base branch
        run: julia --project=benchmark benchmark/judge_ci.jl
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
