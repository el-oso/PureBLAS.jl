name: CI
on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ github.event_name }}
    runs-on: ubuntu-latest
    # The suite uses TrimCheck (Julia 1.12 `Compiler` stdlib), JET, StrictMode, ForwardDiff — pinned to
    # 1.12 (nightly dropped: compiler-internals churn broke it and it added no signal).
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          fail-on-error: false

  perf:
    name: Perf regression (PkgBenchmark judge)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # judge checks out the PR base ref → needs full history
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      # Blocks the merge on a >25% slowdown vs the base branch (coarse: shared runners are noisy — see
      # benchmark/judge_ci.jl). Precise 0.96× OpenBLAS gating runs on a pinned self-hosted fleet runner.
      - name: Judge performance vs base branch
        run: julia --project=benchmark benchmark/judge_ci.jl
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
